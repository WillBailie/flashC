<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Due Cards Ring Animation</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f12;
    --surface: #1a1a1e;
    --text: #f0f0f0;
    --text-secondary: #888;
    --primary: #6c5ce7;
    --ring-track: rgba(108, 92, 231, 0.12);
    --ring-fill: #6c5ce7;
    --font-heading: system-ui, -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', 'Fira Code', monospace;
  }

  .light {
    --bg: #f5f5f7;
    --surface: #ffffff;
    --text: #1a1a1e;
    --text-secondary: #666;
    --primary: #6c5ce7;
    --ring-track: rgba(108, 92, 231, 0.1);
    --ring-fill: #6c5ce7;
  }

  body {
    font-family: var(--font-heading);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s, color 0.3s;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
  }

  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .hero-greeting {
    font-size: 32px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .ring-container {
    position: relative;
    width: 180px;
    height: 180px;
  }

  .ring-container svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 6;
  }

  .ring-fill {
    fill: none;
    stroke: var(--ring-fill);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .ring-center {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-value {
    font-size: 48px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    font-family: var(--font-mono);
    color: var(--text);
    line-height: 1;
  }

  .ring-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .slider-group label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  input[type="range"] {
    width: 240px;
    accent-color: var(--primary);
  }

  .slider-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--primary);
  }

  .buttons {
    display: flex;
    gap: 12px;
  }

  button {
    font-family: var(--font-heading);
    font-size: 14px;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  button:active {
    transform: scale(0.96);
  }

  .btn-primary {
    background: var(--primary);
    color: #fff;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--text-secondary);
  }

  .btn-theme {
    position: fixed;
    top: 24px;
    right: 24px;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--ring-track);
    border-radius: 50%;
    width: 44px;
    height: 44px;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .stats-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border-radius: 9999px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }

  .stat-pill .icon {
    font-size: 14px;
  }

  .stat-pill .label {
    color: var(--text-secondary);
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="container">
  <div class="hero">
    <span class="hero-greeting">Welcome back</span>
  </div>

  <div class="ring-container" id="ringContainer">
    <svg viewBox="0 0 156 156">
      <circle class="ring-track" cx="78" cy="78" r="72" />
      <circle class="ring-fill" id="ringFill" cx="78" cy="78" r="72"
              stroke-dasharray="452.389"
              stroke-dashoffset="452.389" />
    </svg>
    <div class="ring-center">
      <span class="ring-value" id="ringValue">0</span>
      <span class="ring-label">DUE</span>
    </div>
  </div>

  <span class="subtitle" id="subtitle">0 cards reviewed today</span>

  <div class="stats-row">
    <span class="stat-pill"><span class="icon">&#10003;</span><span id="statReviewed">0</span><span class="label">today</span></span>
    <span class="stat-pill"><span class="icon">&#128193;</span><span id="statDecks">0</span><span class="label">decks</span></span>
    <span class="stat-pill"><span class="icon">&#127942;</span><span id="statMastered">0%</span><span class="label">mastered</span></span>
    <span class="stat-pill"><span class="icon">&#128200;</span><span id="statEase">2.5&times;</span><span class="label">avg ease</span></span>
  </div>

  <div class="controls">
    <div class="slider-group">
      <label>Due cards</label>
      <span class="slider-value" id="sliderVal">50</span>
      <input type="range" id="dueSlider" min="0" max="800" value="50" step="1" />
    </div>
    <div class="slider-group">
      <label>Total cards</label>
      <span class="slider-value" id="totalSliderVal">200</span>
      <input type="range" id="totalSlider" min="0" max="800" value="200" step="1" />
    </div>
    <div class="buttons">
      <button class="btn-primary" id="btnAnimate">Animate from 0</button>
      <button class="btn-secondary" id="btnReset">Reset</button>
    </div>
  </div>
</div>

<button class="btn-theme" id="btnTheme" title="Toggle theme">&#9788;</button>

<script>
  const R =  72;
  const circumference = 2 * Math.PI * R;

  const ringFill = document.getElementById('ringFill');
  const ringValue = document.getElementById('ringValue');
  const subtitle = document.getElementById('subtitle');
  const dueSlider = document.getElementById('dueSlider');
  const totalSlider = document.getElementById('totalSlider');
  const sliderVal = document.getElementById('sliderVal');
  const totalSliderVal = document.getElementById('totalSliderVal');
  const statReviewed = document.getElementById('statReviewed');
  const statDecks = document.getElementById('statDecks');
  const statMastered = document.getElementById('statMastered');
  const statEase = document.getElementById('statEase');
  const btnAnimate = document.getElementById('btnAnimate');
  const btnReset = document.getElementById('btnReset');
  const btnTheme = document.getElementById('btnTheme');

  let displayDue = 0;
  let rafId = null;
  let animating = false;

  function getDashOffset(due, total) {
    const max = total > 0 ? total : 800;
    const ratio = Math.min(due, max) / max;
    return circumference * (1 - ratio);
  }

  function setRingInstant(due, total) {
    const offset = getDashOffset(due, total);
    ringFill.style.transition = 'none';
    ringFill.setAttribute('stroke-dashoffset', offset);
    displayDue = due;
    ringValue.textContent = due;
  }

  function animateRingOnly(due, total) {
    const offset = getDashOffset(due, total);
    ringFill.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    ringFill.setAttribute('stroke-dashoffset', offset);
  }

  function cancelAnimation() {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = null;
    }
    animating = false;
  }

  function animateDueNumber(from, to, onComplete) {
    cancelAnimation();
    animating = true;
    let start = null;
    const duration = 1000;

    function animate(timestamp) {
      if (!start) start = timestamp;
      const elapsed = timestamp - start;
      const progress = Math.min(elapsed / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      displayDue = Math.round(from + (to - from) * eased);
      ringValue.textContent = displayDue;

      if (progress < 1) {
        rafId = requestAnimationFrame(animate);
      } else {
        animating = false;
        rafId = null;
        if (onComplete) onComplete();
      }
    }

    rafId = requestAnimationFrame(animate);
  }

  function animateFromZero() {
    const due = parseInt(dueSlider.value);
    const total = parseInt(totalSlider.value);

    cancelAnimation();
    displayDue = 0;
    ringValue.textContent = '0';

    setRingInstant(0, total);

    const offset = getDashOffset(due, total);
    ringFill.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    ringFill.setAttribute('stroke-dashoffset', offset);

    animateDueNumber(0, due);
    updateStats(due, total);
  }

  function updateOnSlide() {
    const due = parseInt(dueSlider.value);
    const total = parseInt(totalSlider.value);

    if (animating) {
      cancelAnimation();
    }

    const from = displayDue;
    const offset = getDashOffset(due, total);
    ringFill.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.16, 1, 0.3, 1)';
    ringFill.setAttribute('stroke-dashoffset', offset);

    animateDueNumber(from, due);
    updateStats(due, total);
  }

  function updateStats(due, total) {
    sliderVal.textContent = due;
    totalSliderVal.textContent = total;
    statDecks.textContent = Math.max(1, Math.floor(total / 40));
    statReviewed.textContent = Math.max(0, Math.floor(due * 0.3));
    const mastered = total > 0 ? Math.round(((total - due) / total) * 100) : 0;
    statMastered.textContent = mastered + '%';
    statEase.textContent = (2.3 + (mastered / 200)).toFixed(1) + '\u00d7';
    subtitle.textContent = statReviewed.textContent + ' cards reviewed today';
  }

  function resetAll() {
    cancelAnimation();
    displayDue = 0;
    ringValue.textContent = '0';
    dueSlider.value = 0;
    totalSlider.value = 0;
    sliderVal.textContent = '0';
    totalSliderVal.textContent = '0';
    setRingInstant(0, 1);
    updateStats(0, 0);
  }

  btnAnimate.addEventListener('click', animateFromZero);
  btnReset.addEventListener('click', () => {
    dueSlider.value = 50;
    totalSlider.value = 200;
    resetAll();
  });

  dueSlider.addEventListener('input', updateOnSlide);
  totalSlider.addEventListener('input', updateOnSlide);

  btnTheme.addEventListener('click', () => {
    document.body.classList.toggle('light');
    btnTheme.innerHTML = document.body.classList.contains('light') ? '&#9790;' : '&#9788;';
  });

  const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
  if (prefersLight) {
    document.body.classList.add('light');
    btnTheme.innerHTML = '&#9790;';
  }

  setRingInstant(0, 200);
  updateStats(0, 200);
</script>
</body>
</html>
